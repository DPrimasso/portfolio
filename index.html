<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Daniele Primasso — Software Developer & Data Analyst. 10+ years building solid backends, data pipelines and blockchain systems in production." />
  <meta name="author" content="Daniele Primasso" />
  <title>Daniele Primasso — Portfolio</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Mono:wght@300;400;500&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app"></div>
  <script>
    (() => {
      try {
        const stored = localStorage.getItem('dp-theme')
        const preferred =
          stored === 'dark' || stored === 'light'
            ? stored
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark'
        document.documentElement.dataset.theme = preferred
      } catch {
        document.documentElement.dataset.theme = 'dark'
      }
    })()
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
